name: Run Daily Data Pipeline

on:
  schedule:
    # Runs automatically every single day at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allows to run it manually with a button click

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      run: python scraper.py

    - name: Run Transformation and Load into Database
      run: python pipeline.py

    - name: Commit and Push database updates back to GitHub
      run: |
        git config --global user.name "Automated Data Pipeline"
        git config --global user.email "pipeline@actions.com"
        git add -f space_missions.db
        git commit -m "Automated update: Fresh data logs" || echo "No data changes discovered today."
        git push